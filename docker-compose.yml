services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agrotrain
      POSTGRES_USER: agrotrain
      POSTGRES_PASSWORD: agrotrain_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agrotrain -d agrotrain"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    entrypoint: ["/app/docker-entrypoint.sh"]
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.docker
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-docker-dev}
      POSTGRES_DB: agrotrain
      POSTGRES_USER: agrotrain
      POSTGRES_PASSWORD: agrotrain_dev
      POSTGRES_HOST: db
      EE_SERVICE_ACCOUNT: ${EE_SERVICE_ACCOUNT:-}
      EE_PRIVATE_KEY_FILE: /app/secrets/gee-key.json
      EE_PROJECT: ${EE_PROJECT:-}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      VITE_BACKEND_URL: http://localhost:8000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend

volumes:
  postgres_data:
